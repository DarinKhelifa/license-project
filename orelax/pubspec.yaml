name: orelax
description: A secure gated community mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # For smooth page indicator
  smooth_page_indicator: ^1.1.0

  # SVG support for logo and other vector assets
  flutter_svg: ^2.0.7
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/introImg.png
    - assets/images/backgound1.jpg
    - assets/images/background2.jpg
    - assets/images/logo-white.png
    - assets/images/logo-green.png
    - assets/images/logo.svg
    - assets/icon/