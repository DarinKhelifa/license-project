<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#f2f2f2"></rect>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d9d9d9" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"></rect>

  <!-- Logo Color -->
  <g fill="#D4A62A">

    <!-- Key Head -->
    <circle cx="250" cy="220" r="60" fill="none" stroke="#D4A62A" stroke-width="20"></circle>
    <circle cx="250" cy="220" r="25" fill="#f2f2f2"></circle>

    <!-- Key Shaft -->
    <rect x="300" y="200" width="250" height="40" rx="5"></rect>

    <!-- House 1 -->
    <polygon points="420,160 460,120 500,160"></polygon>
    <rect x="435" y="160" width="50" height="60"></rect>
    <rect x="455" y="180" width="15" height="40" fill="#f2f2f2"></rect>

    <!-- House 2 -->
    <polygon points="500,160 540,120 580,160"></polygon>
    <rect x="515" y="160" width="50" height="60"></rect>
    <rect x="535" y="180" width="15" height="40" fill="#f2f2f2"></rect>

  </g>

  <!-- Text -->
  <text x="400" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" letter-spacing="12" fill="#D4A62A">
    ORELAX
  </text>

</svg>