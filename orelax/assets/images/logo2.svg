<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#154734"></rect>

  <!-- Optional subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0f3a2b" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.4"></rect>

  <!-- Logo Mark -->
  <g fill="#F2D35B">

    <!-- Hexagon -->
    <polygon points="
      400,140
      490,190
      490,310
      400,360
      310,310
      310,190
    "></polygon>

    <!-- Roof -->
    <polygon points="
      280,200
      400,120
      520,200
      520,220
      400,150
      280,220
    "></polygon>

    <!-- Chimney -->
    <rect x="335" y="135" width="20" height="40"></rect>

  </g>

  <!-- Keyhole Shape -->
  <g fill="#154734">
    <circle cx="400" cy="230" r="25"></circle>
    <polygon points="
      385,240
      415,240
      405,280
      405,330
      395,330
      395,280
    "></polygon>
  </g>

  <!-- Text -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="90" letter-spacing="4" fill="#F2D35B">
    ORELAX
  </text>

</svg>