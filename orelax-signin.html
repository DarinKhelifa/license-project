<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orelax — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6b2f;
    --green-dark: #134d22;
    --green-light: #2d8a44;
    --yellow: #f5d000;
    --white: #ffffff;
    --gray-100: #f4f6f4;
    --gray-200: #e8ece8;
    --gray-400: #9aab9a;
    --gray-600: #4a5e4a;
    --text: #1a2a1a;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: var(--white);
    border-radius: 50px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 32px;
    background: #111;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 20px;
    position: relative; z-index: 1;
  }

  .nav-logo {
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .nav-brand {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 2.5px;
  }

  /* Header */
  .header {
    background: var(--green);
    padding: 48px 28px 72px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    top: -60px; right: -60px;
  }
  .header::after {
    content: '';
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: -30px; left: -30px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    position: relative; z-index: 1;
  }

  .brand-icon {
    width: 28px; height: 28px;
    background: var(--yellow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-icon svg { width: 16px; height: 16px; }

  .brand-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 2px;
  }

  .header-icon-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 28px 0 16px;
    position: relative; z-index: 1;
  }

  .header-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }

  .header-icon svg { width: 32px; height: 32px; stroke: var(--white); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--white);
    text-align: center;
    position: relative; z-index: 1;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    margin-top: 4px;
    position: relative; z-index: 1;
    font-weight: 300;
  }

  /* Card */
  .card {
    flex: 1;
    background: var(--white);
    border-radius: 32px 32px 0 0;
    margin-top: -32px;
    position: relative; z-index: 2;
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Fields */
  .field {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: 14px;
    padding: 14px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--white);
  }

  .field:focus-within {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,107,47,0.08);
  }

  .field-icon { flex-shrink: 0; }
  .field-icon svg { width: 18px; height: 18px; stroke: var(--gray-400); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .field input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: transparent;
  }

  .field input::placeholder { color: var(--gray-400); font-weight: 300; }

  .eye-btn {
    background: none; border: none; cursor: pointer; padding: 0;
    display: flex; align-items: center;
  }
  .eye-btn svg { width: 18px; height: 18px; stroke: var(--gray-400); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Forgot */
  .forgot {
    text-align: right;
    font-size: 12.5px;
    color: var(--green);
    font-weight: 500;
    cursor: pointer;
    margin-top: -4px;
    text-decoration: none;
  }
  .forgot:hover { text-decoration: underline; }

  /* Dots */
  .dots {
    display: flex; gap: 6px; justify-content: center; margin: 4px 0;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-200); }
  .dot.active { background: var(--green); width: 20px; border-radius: 3px; }

  /* Btn */
  .btn-login {
    background: var(--green);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 14px;
    padding: 17px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(26,107,47,0.28);
    margin-top: 4px;
  }

  .btn-login:hover { background: var(--green-light); box-shadow: 0 10px 28px rgba(26,107,47,0.35); }
  .btn-login:active { transform: scale(0.98); }

  /* Footer link */
  .signin-link {
    text-align: center;
    font-size: 13px;
    color: var(--gray-600);
    font-weight: 300;
  }

  .signin-link a {
    color: var(--green);
    font-weight: 700;
    text-decoration: none;
    font-family: 'Syne', sans-serif;
  }

  /* Animations */
  .header { animation: slideDown 0.5s cubic-bezier(0.22,1,0.36,1) both; }
  .card { animation: fadeUp 0.5s 0.15s cubic-bezier(0.22,1,0.36,1) both; }
  .field:nth-child(1) { animation: fadeUp 0.4s 0.25s both; }
  .field:nth-child(2) { animation: fadeUp 0.4s 0.32s both; }
  .field:nth-child(3) { animation: fadeUp 0.4s 0.39s both; }
  .btn-login { animation: fadeUp 0.4s 0.52s both; }
  .signin-link { animation: fadeUp 0.4s 0.58s both; }

  @keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes fadeUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="notch"></div>

  <div class="header">
    <div class="navbar">
      <div class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/>
          <circle cx="12" cy="10" r="2" fill="white"/>
        </svg>
      </div>
      <span class="nav-brand">ORELAX</span>
    </div>
    <div class="header-icon-wrap">
      <div class="header-icon">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
    </div>
    <div class="header-title">Welcome Back</div>
    <div class="header-sub">Sign in to manage your residence</div>
  </div>

  <div class="card">
    <!-- Name -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <input type="text" placeholder="Name">
    </div>

    <!-- Email -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
      </div>
      <input type="email" placeholder="E-mail">
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <input type="password" placeholder="Password" id="pwd">
      <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <a href="#" class="forgot">Forgot password?</a>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <button class="btn-login">LOGIN</button>

    <p class="signin-link">Already Have Account? <a href="#">Sign Up</a></p>
  </div>
</div>

<script>
  let shown = false;
  function togglePwd() {
    const input = document.getElementById('pwd');
    const icon = document.getElementById('eye-icon');
    shown = !shown;
    input.type = shown ? 'text' : 'password';
    icon.innerHTML = shown
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
</script>
</body>
</html>
